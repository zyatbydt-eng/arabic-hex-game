<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🔔 بازر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:manipulation;overscroll-behavior:none}
body{
  font-family:'Tajawal','Segoe UI',Arial,sans-serif;direction:rtl;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#060018;color:#fff;user-select:none;transition:background .5s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 5%,#180055,transparent 65%),
    radial-gradient(ellipse 90% 40% at 50% 100%,#0A0A3A,transparent 60%),#060018;
}
.wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;
  gap:16px;padding:16px;width:100%;max-width:380px}

.conn-badge{padding:5px 14px;border-radius:50px;font-size:11px;font-weight:800;
  letter-spacing:1px;border:1.5px solid;display:flex;align-items:center;gap:5px;transition:all .3s}
.conn-badge.same{border-color:#4433AA;background:#110033;color:#6655BB}
.conn-badge.net{border-color:#00C853;background:#00180A;color:#00C853}
.conn-badge.err{border-color:#EF4444;background:#1A0000;color:#EF4444}
.conn-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:cdot 1.4s ease-in-out infinite}
@keyframes cdot{0%,100%{opacity:.4}50%{opacity:1}}

.nin{width:100%;max-width:280px;background:#110033;border:2px solid #3322AA;border-radius:14px;
  color:#fff;font-family:'Tajawal','Segoe UI',Arial,sans-serif;font-size:19px;font-weight:700;
  text-align:center;padding:9px 16px;outline:none;direction:rtl;transition:border-color .2s}
.nin:focus{border-color:#AA88FF}
.nin::placeholder{color:#3322AA}
.trow{display:flex;gap:10px}
.tt{padding:7px 20px;border-radius:14px;border:2.5px solid #2211AA;cursor:pointer;
  font-size:14px;font-weight:800;color:#5544AA;font-family:'Tajawal','Segoe UI',Arial,sans-serif;
  background:transparent;transition:all .2s}
.tt.tg.on{border-color:#00C853;background:#001A0A;color:#00C853}
.tt.to.on{border-color:#FF6D00;background:#1A0A00;color:#FF6D00}

.bz-wrap{width:100%;max-width:260px;aspect-ratio:1;display:flex;align-items:center;
  justify-content:center;position:relative}
.ring{position:absolute;border-radius:50%;pointer-events:none}
.ring.active{animation:rpulse var(--rd,.9s) ease-out forwards var(--rdl,0s)}
@keyframes rpulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.5);opacity:0}}

.bz{width:86%;height:86%;border-radius:50%;border:none;cursor:pointer;
  font-family:'Tajawal','Segoe UI',Arial,sans-serif;font-weight:900;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  position:relative;overflow:hidden;transition:transform .1s,box-shadow .15s;
  background:radial-gradient(circle at 38% 32%,#FFE840,#FFB300,#A87000);
  box-shadow:0 10px 0 #7A5000,0 14px 40px #FFB30040,inset 0 2px 8px #FFFFFF28;
  color:#3A1800;z-index:2}
.bz:active:not(.locked){transform:translateY(7px) scale(.96);box-shadow:0 3px 0 #7A5000,0 4px 16px #FFB30020}
.bz::before{content:'';position:absolute;top:8%;left:15%;width:50%;height:40%;
  background:radial-gradient(circle,#FFFFFF40,transparent 70%);border-radius:50%;pointer-events:none}
.bz.waiting{animation:bwait .5s ease infinite alternate}
@keyframes bwait{from{transform:scale(1)}to{transform:scale(1.03)}}
.bz.won{background:radial-gradient(circle at 38% 32%,#AAFFD3,#00C853,#005522);
  box-shadow:0 10px 0 #003A14,0 14px 48px #00C85350,inset 0 2px 8px #FFFFFF30;
  color:#001A0A;animation:bwon .65s cubic-bezier(.2,1.5,.4,1)}
@keyframes bwon{0%{transform:scale(.9)}40%{transform:scale(1.13) rotate(-1.5deg)}75%{transform:scale(.97)}100%{transform:scale(1)}}
.bz.lost{background:radial-gradient(circle at 38% 32%,#FF8888,#EF4444,#7F1D1D);
  box-shadow:0 8px 0 #5A1010,0 10px 32px #EF444440;color:#fff;animation:blast .35s ease}
@keyframes blast{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.bz.locked{background:radial-gradient(circle at 38% 32%,#444,#2A2A2A,#111);
  box-shadow:0 6px 0 #0A0A0A;color:#444;cursor:not-allowed}
.bz-ico{font-size:clamp(36px,16vw,68px);line-height:1;transition:all .4s}
.bz-main{font-size:clamp(18px,7vw,30px);font-weight:900;transition:all .3s}
.bz-sub{font-size:clamp(11px,3.5vw,14px);opacity:.7;transition:all .3s}

.status{font-size:15px;font-weight:700;color:#5544AA;text-align:center;min-height:22px;transition:all .3s}
.status.won{color:#00C853;font-size:17px}
.status.lost{color:#EF4444;font-size:17px}
.wchip{padding:7px 18px;border-radius:50px;font-size:14px;font-weight:800;border:2px solid;
  text-align:center;opacity:0;transition:opacity .4s}
.wchip.on{opacity:1}
.wchip.g{border-color:#00C853;background:#00C85315;color:#00C853}
.wchip.o{border-color:#FF6D00;background:#FF6D0015;color:#FF6D00}

.footer{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:4px;width:100%}
.rbtn{padding:7px 18px;border-radius:50px;border:1.5px solid #3322AA;background:transparent;
  color:#6655AA;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Tajawal','Segoe UI',Arial,sans-serif;transition:all .2s}
.rbtn:hover{border-color:#8866FF;color:#AA88FF}
.srv-hint{font-size:10px;color:#2211AA;text-align:center;max-width:280px;line-height:1.5;cursor:pointer}
.srv-hint em{color:#4433AA;text-decoration:underline;font-style:normal}

.srv-panel{background:#0D0025;border:1.5px solid #3322AA;border-radius:14px;
  padding:12px 14px;width:100%;display:none}
.srv-panel.on{display:block}
.srv-label{font-size:10px;font-weight:800;color:#5544AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.srv-row{display:flex;gap:7px;align-items:center}
.srv-in{flex:1;background:#060018;border:1.5px solid #3322AA;border-radius:10px;
  color:#AA88FF;font-family:monospace;font-size:13px;padding:7px 10px;
  outline:none;direction:ltr;transition:border-color .2s}
.srv-in:focus{border-color:#AA88FF}
.srv-in::placeholder{color:#2211AA;font-size:11px}
.srv-go{padding:7px 12px;border-radius:10px;border:none;background:#3322AA;color:#fff;
  font-family:'Tajawal','Segoe UI',Arial,sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:background .2s}
.srv-go:hover{background:#5544CC}
.srv-info{font-size:10px;color:#4433AA;margin-top:7px;line-height:1.6;text-align:center}
.srv-info code{color:#6655BB;font-size:11px}

body.s-won{background:#001808}
body.s-lost{background:#1A0000}
</style>
</head>
<body>
<div class="wrap">
  <div class="conn-badge same" id="cb">
    <div class="conn-dot"></div>
    <span id="ct">نفس الجهاز (تبويب)</span>
  </div>

  <input class="nin" id="nin" placeholder="✏️ اسمك..." maxlength="14" oninput="myName=this.value.trim()">
  <div class="trow">
    <button class="tt tg on" id="tt-g" onclick="setTeam('green')">🟢 أخضر</button>
    <button class="tt to" id="tt-o" onclick="setTeam('orange')">🟠 برتقالي</button>
  </div>

  <div class="bz-wrap">
    <div class="ring" id="r1" style="width:86%;height:86%;border:4px solid #00C853"></div>
    <div class="ring" id="r2" style="width:86%;height:86%;border:3px solid #69F0AE;--rdl:.18s"></div>
    <button class="bz" id="bz" ontouchstart="onPress(event)" onmousedown="onPress(event)">
      <div class="bz-ico" id="bico">🔔</div>
      <div class="bz-main" id="bmain">بازر!</div>
      <div class="bz-sub" id="bsub">اضغط للإجابة أولاً</div>
    </button>
  </div>

  <div class="status" id="st"></div>
  <div class="wchip" id="wc"></div>

  <div class="footer">
    <button class="rbtn" onclick="doReset()">🔄 إعادة تعيين</button>
    <div class="srv-hint" onclick="toggleSrv()">
      للاستخدام على <em>هواتف مختلفة</em> — اضغط لإعداد الشبكة
    </div>
    <div class="srv-panel" id="srv">
      <div class="srv-label">🌐 الخادم المحلي</div>
      <div class="srv-row">
        <input class="srv-in" id="sri" placeholder="ws://192.168.1.X:8765" dir="ltr">
        <button class="srv-go" onclick="connectWS()">اتصل</button>
      </div>
      <div class="srv-info">
        شغّل <strong>server.py</strong> على حاسوبك ثم أدخل عنوانه<br>
        مثال: <code>ws://192.168.1.5:8765</code>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
let myName='', myTeam='green';
const myId = Math.random().toString(36).slice(2,10);
let buzzState='idle', resultId=null;
let pending=[], decideTO=null;

// ── Communication ──
let BC=null, WS=null;
try{ BC=new BroadcastChannel('arb-buzz-v2'); }catch(e){}

// Listen on BOTH buzz channel AND main game channel (for auto-reset)
let BCG=null;
try{ BCG=new BroadcastChannel('arb-hex-v5'); }catch(e){}

function connectWS(){
  const url=document.getElementById('sri').value.trim();
  if(!url){return;}
  if(WS){WS.close();WS=null;}
  try{
    WS=new WebSocket(url);
    WS.onopen=()=>{
      localStorage.setItem('buzz_ws',url);
      setBadge('net','🌐 متصل: '+url.replace('ws://',''));
      send({t:'join',id:myId,name:myName||'لاعب',team:myTeam});
    };
    WS.onclose=()=>{WS=null;setBadge('same','نفس الجهاز (تبويب)');}
    WS.onerror=()=>{WS=null;setBadge('err','فشل — تحقق من الخادم');}
    WS.onmessage=e=>{try{handle(JSON.parse(e.data));}catch(x){}}
    setBadge('net','⏳ جارٍ الاتصال...');
  }catch(err){setBadge('err','عنوان غير صحيح');}
}

const saved=localStorage.getItem('buzz_ws');
if(saved){document.getElementById('sri').value=saved;setTimeout(connectWS,600);}

function send(msg){
  if(WS?.readyState===1) WS.send(JSON.stringify(msg));
  if(BC) BC.postMessage(msg);
}

if(BC) BC.onmessage=e=>{try{handle(e.data);}catch(x){}};
if(BCG) BCG.onmessage=e=>{
  const ph=e.data?.d?.phase;
  if(ph==='lobby'||ph==='question') resetLocal();
};

// ── Press handler ──
function onPress(e){
  e.preventDefault();
  if(buzzState!=='idle') return;
  const name=document.getElementById('nin').value.trim()||'لاعب';
  myName=name;
  const now=Date.now();
  buzzState='pressed';
  pending.push({id:myId,name,team:myTeam,time:now});
  send({t:'buzz',id:myId,name,team:myTeam,time:now});
  clearTimeout(decideTO);
  decideTO=setTimeout(decide,220);
  setBtn('waiting');
}

function decide(){
  if(!pending.length||resultId) return;
  pending.sort((a,b)=>a.time-b.time);
  const w=pending[0];
  pending=[];
  resultId=w.id;
  send({t:'buzz_result',winner:w});
  applyResult(w);
}

function handle(d){
  if(!d?.t) return;
  if(d.t==='buzz'&&d.id!==myId){
    pending.push({id:d.id,name:d.name,team:d.team,time:d.time});
    clearTimeout(decideTO);
    decideTO=setTimeout(decide,220);
  }
  if(d.t==='buzz_result'&&!resultId){
    resultId=d.winner.id;
    pending=[];clearTimeout(decideTO);
    applyResult(d.winner);
  }
  if(d.t==='reset') resetLocal();
}

function applyResult(w){
  buzzState='buzzed';
  const wc=document.getElementById('wc');
  wc.className=`wchip on ${w.team[0]}`;
  wc.textContent=`${w.team==='green'?'🟢':'🟠'} ${w.name} ضغط أولاً!`;
  if(w.id===myId){
    setBtn('won');
    setSt('won','🎉 أنت الأول! أجب الآن!');
    document.body.className='s-won';
    pulseRings(); playWon();
  } else {
    setBtn('lost');
    setSt('lost',`سبقك: ${w.name}`);
    document.body.className='s-lost';
    playLost();
  }
}

function doReset(){ resetLocal(); send({t:'reset'}); }
function resetLocal(){
  buzzState='idle'; resultId=null; pending=[];
  clearTimeout(decideTO);
  setBtn('idle');
  setSt('','');
  document.getElementById('wc').className='wchip';
  document.body.className='';
}

// ── UI helpers ──
function setBtn(s){
  const bz=document.getElementById('bz');
  const ico=document.getElementById('bico');
  const mn=document.getElementById('bmain');
  const sb=document.getElementById('bsub');
  bz.className='bz '+s;
  const cfg={
    idle:{i:'🔔',m:'بازر!',s:'اضغط للإجابة أولاً'},
    waiting:{i:'⏳',m:'انتظر...',s:''},
    won:{i:'🏆',m:'أنت الأول!',s:'أجب الآن!'},
    lost:{i:'❌',m:'تأخرت!',s:''},
    locked:{i:'🔒',m:'مغلق',s:''},
  }[s]||{i:'🔔',m:'بازر!',s:''};
  ico.textContent=cfg.i; mn.textContent=cfg.m; sb.textContent=cfg.s;
}
function setSt(cls,txt){
  const el=document.getElementById('st');
  el.className='status'+( cls?' '+cls:'');
  el.textContent=txt;
}
function setBadge(cls,txt){
  document.getElementById('cb').className='conn-badge '+cls;
  document.getElementById('ct').textContent=txt;
}
function setTeam(t){
  myTeam=t;
  document.getElementById('tt-g').classList.toggle('on',t==='green');
  document.getElementById('tt-o').classList.toggle('on',t==='orange');
}
function toggleSrv(){ document.getElementById('srv').classList.toggle('on'); }
function pulseRings(){
  const r1=document.getElementById('r1'),r2=document.getElementById('r2');
  function pulse(){
    r1.className='ring active';r2.className='ring active';
    setTimeout(()=>{r1.className='ring';r2.className='ring';},1000);
  }
  pulse();setTimeout(pulse,500);
}

// ── Audio ──
let ac;
const A=()=>ac||(ac=new(window.AudioContext||window.webkitAudioContext)());
function tn(f,d,type='sine',vol=.25,t0=0){
  try{const c=A(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=f;
    const s=c.currentTime+t0;
    g.gain.setValueAtTime(vol,s);g.gain.exponentialRampToValueAtTime(.001,s+d);
    o.start(s);o.stop(s+d+.05);}catch(e){}
}
function playWon(){[523,659,784,1047].forEach((f,i)=>tn(f,.35,'sine',.25,i*.08));}
function playLost(){[330,262].forEach((f,i)=>tn(f,.35,'sawtooth',.17,i*.18));}
</script>
</body>
</html>
